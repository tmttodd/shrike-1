source: sentinelone
description: SentinelOne EDR events — threats, activities, and Deep Visibility process telemetry
version: 1
patterns:
  - name: sentinelone_threat
    match:
      log_format: [json]
      json_has: ["agentId", "threatInfo", "createdAt"]
    ocsf_class_uid: 2004
    ocsf_class_name: Detection Finding
    static:
      activity_id: 1
      activity_name: "Create"
      category_uid: 2
      category_name: "Findings"
      type_uid: 200401
    field_map:
      threatInfo.threatName: finding_info.title
      threatInfo.threatId: finding_info.uid
      threatInfo.classification: finding_info.types
      threatInfo.confidenceLevel: confidence
      threatInfo.detectionType: finding_info.analytic.type
      threatInfo.filePath: process.file.path
      threatInfo.sha256: process.file.hashes.sha256
      threatInfo.md5: process.file.hashes.md5
      threatInfo.sha1: process.file.hashes.sha1
      threatInfo.originatorProcess: process.parent_process.name
      threatInfo.processUser: actor.user.name
      threatInfo.mitigationStatus: disposition
      agentRealtimeInfo.agentComputerName: device.hostname
      agentRealtimeInfo.agentDomain: device.domain
      agentRealtimeInfo.agentOsName: device.os.name
      agentRealtimeInfo.accountName: cloud.account.name
      agentRealtimeInfo.accountId: cloud.account.uid
      agentRealtimeInfo.siteName: cloud.org.name
      agentId: device.agent_list.uid
      id: metadata.uid
      createdAt: time

  - name: sentinelone_activity
    match:
      log_format: [json]
      json_has: ["accountId", "activityType", "agentId", "createdAt"]
    ocsf_class_uid: 6003
    ocsf_class_name: API Activity
    static:
      activity_id: 3
      activity_name: "Update"
      category_uid: 6
      category_name: "Application Activity"
      type_uid: 600303
    field_map:
      activityType: metadata.event_code
      primaryDescription: api.operation
      description: message
      data.username: actor.user.name
      data.computerName: device.hostname
      data.accountName: cloud.account.name
      data.siteName: cloud.org.name
      agentId: device.agent_list.uid
      accountId: cloud.account.uid
      siteId: cloud.org.uid
      id: metadata.uid
      createdAt: time

  - name: sentinelone_deep_visibility_process
    match:
      log_format: [json]
      json_has: ["agentId", "objectType", "processName", "pid"]
    ocsf_class_uid: 1007
    ocsf_class_name: Process Activity
    static:
      activity_id: 1
      activity_name: "Launch"
      category_uid: 1
      category_name: "System Activity"
      type_uid: 100701
    field_map:
      processName: process.name
      pid: process.pid
      processCmd: process.cmd_line
      processImagePath: process.file.path
      processImageSha256Hash: process.file.hashes.sha256
      parentProcessName: process.parent_process.name
      parentPid: process.parent_process.pid
      user: actor.user.name
      endpointName: device.hostname
      endpointOs: device.os.name
      agentId: device.agent_list.uid
      accountId: cloud.account.uid
      siteId: cloud.org.uid
      createdAt: time
      processStartTime: start_time
