source: sentinelone
description: 'SentinelOne endpoint protection logs'
version: 1
patterns:
  - name: sentinelone_threat_detected
    match:
      log_format: [json]
      regex: '"type":\s*"THREAT".*?"threatName":\s*"(?P<threat_name>[^"]+).*?"severity":\s*(?P<severity>\d+)'
    ocsf_class_uid: 6002
    ocsf_class_name: Malware Detection
    field_map:
      threat_name: finding_info.title
      severity: severity
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: SentinelOne
      product_name: Endpoint Protection

  - name: sentinelone_process_terminated
    match:
      log_format: [json]
      regex: '"type":\s*"PROCESS_TERMINATED".*?"pid":\s*(?P<pid>\d+).*?"cmdline":\s*"(?P<cmd>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      pid: process.pid
      cmd: process.cmd_line
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: SentinelOne
      product_name: Endpoint Protection

  - name: sentinelone_agent_connected
    match:
      log_format: [json]
      regex: '"type":\s*"AGENT_CONNECTED".*?"hostName":\s*"(?P<hostname>[^"]+)"'
    ocsf_class_uid: 3004
    ocsf_class_name: Account Change
    field_map:
      hostname: device.hostname
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: SentinelOne
      product_name: Endpoint Protection