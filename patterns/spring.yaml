source: spring
description: 'Spring Framework application logs'
version: 1
patterns:
  - name: spring_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"method":\s*"(?P<method>\w+).*?"uri":\s*"(?P<uri>[^"]+).*?"status":\s*(?P<status>\d+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      uri: dst_endpoint.uri
      status: status
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Spring
      product_name: Framework

  - name: spring_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"exception":\s*"(?P<exc>[^"]+).*?"message":\s*"(?P<msg>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      exc: activity.description
      msg: activity.description
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Spring
      product_name: Framework
      severity_id: 3

  - name: spring_transaction
    match:
      log_format: [json]
      regex: '"event":\s*"transaction".*?"name":\s*"(?P<name>[^"]+).*?"status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: process.name
      status: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Spring
      product_name: Framework