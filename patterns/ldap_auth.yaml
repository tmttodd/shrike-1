source: ldap_auth
description: LDAP/Active Directory authentication and search logs
version: 1
patterns:
  - name: ldap_search
    match:
      log_format: [kv, syslog_bsd, custom]
      regex: 'conn=(?P<conn_id>\d+)\s+op=(?P<op_id>\d+)\s+SRCH\s+(?P<msg>.+)'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 0
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      conn_id: session.uid
      op_id: metadata.uid
      msg: message

  - name: ad_modify
    match:
      log_format: [kv, syslog_bsd, custom]
      regex: 'ad-modify:\s+subject=(?P<actor>\S+)\s+target=(?P<target>\S+)\s+action=(?P<action>\S+)\s+detail="(?P<detail>[^"]+)"'
    ocsf_class_uid: 3004
    ocsf_class_name: Entity Management
    static:
      severity_id: 2
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      actor: actor.user.name
      target: user
      action: activity_name
      detail: message

  - name: security_audit_group
    match:
      log_format: [kv, syslog_bsd, custom]
      regex: 'Security Audit:\s+Event\s+(?P<event_id>\d+),\s+Machine=(?P<host>\S+),\s+User=(?P<user>\S+),\s+Group=(?P<group>[^,]+),\s+Added=(?P<added>\S+)'
    ocsf_class_uid: 3006
    ocsf_class_name: Group Management
    static:
      activity_id: 1
      activity_name: "Assign Privileges"
      severity_id: 2
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      event_id: metadata.event_code
      host: device.hostname
      user: actor.user.name
      group: group.name
      added: user
