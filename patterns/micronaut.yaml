source: micronaut
description: 'Micronaut framework logs'
version: 1
patterns:
  - name: micronaut_start
    match:
      log_format: [json]
      regex: '"event":\s*"start".*?"application":\s*"(?P<app>[^"]+).*?"context":\s*"(?P<ctx>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      app: process.name
      ctx: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Micronaut
      product_name: Framework

  - name: micronaut_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"controller":\s*"(?P<ctrl>[^"]+).*?"method":\s*"(?P<method>\w+).*?"status":\s*(?P<status>\d+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      ctrl: process.name
      method: activity.name
      status: status
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Micronaut
      product_name: Framework

  - name: micronaut_event
    match:
      log_format: [json]
      regex: '"event":\s*"event".*?"name":\s*"(?P<name>[^"]+).*?"listener":\s*"(?P<listener>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: activity.name
      listener: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Micronaut
      product_name: Framework