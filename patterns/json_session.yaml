source: json_session
description: JSON Authorize Session events — Kerberos tickets, session management, PAM bastion
version: 1
patterns:
  - name: json_session_management
    match:
      log_format: [json]
      json_has: ["SessionID", "StartTime", "Status"]
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      activity_name: "Assign Privileges"
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300301
    field_map:
      SessionID: session.uid
      ManagedAccountName: user.name
      AssetName: dst_endpoint.hostname
      StartTime: start_time
      EndTime: end_time
      Duration: session.count
      Protocol: connection_info.protocol_name
      Status: status
      RequestID: metadata.uid
      RecordKey: metadata.correlation_uid

  - name: json_remote_session_event
    match:
      log_format: [json]
      json_has: ["event_type", "destination", "body"]
      contains: "Session"
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      activity_name: "Assign Privileges"
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300301
    field_map:
      destination.hostname: dst_endpoint.hostname
      destination.public_ip: dst_endpoint.ip
      destination.private_ip: dst_endpoint.intermediate_ips
      destination.username: user.name
      destination.os: dst_endpoint.os.name
      event_type: activity_name
      body: message
      filename: metadata.uid

  - name: json_beyondtrust_session
    match:
      log_format: [json]
      json_has: ["event_type", "session_id", "performed_by", "timestamp"]
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      event_type: activity_name
      session_id: session.uid
      performed_by.name: actor.user.name
      performed_by.type: actor.user.type
      jump_group.name: dst_endpoint.name
      timestamp: time
      data: message

  - name: syslog_session_close
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'sshd\(pam_unix\)\[(?P<pid>\d+)\]:\s+session\s+(?P<action>opened|closed)\s+for\s+user\s+(?P<user>\S+)'
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      user: user
      pid: process.pid
      action: activity_name
