source: jenkins
description: 'Jenkins CI/CD logs'
version: 1
patterns:
  - name: jenkins_build_start
    match:
      log_format: [json]
      regex: '"event":\s*"build_start".*?"job":\s*"(?P<job>[^"]+).*?"build":\s*(?P<build>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      job: process.name
      build: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Jenkins
      product_name: CI/CD

  - name: jenkins_build_complete
    match:
      log_format: [json]
      regex: '"event":\s*"build_complete".*?"job":\s*"(?P<job>[^"]+).*?"build":\s*(?P<build>\d+).*?"result":\s*"(?P<result>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      job: process.name
      build: metadata.count
      result: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Jenkins
      product_name: CI/CD

  - name: jenkins_stage
    match:
      log_format: [json]
      regex: '"event":\s*"stage".*?"name":\s*"(?P<name>[^"]+).*?"status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: activity.name
      status: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Jenkins
      product_name: CI/CD