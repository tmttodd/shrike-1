source: qradar
description: 'IBM QRadar SIEM logs'
version: 1
patterns:
  - name: qradar_offense
    match:
      log_format: [json]
      regex: '"event":\s*"offense".*?"description":\s*"(?P<desc>[^"]+).*?"magnitude":\s*(?P<mag>\d+)"'
    ocsf_class_uid: 6001
    ocsf_class_name: Threat Detection
    field_map:
      desc: finding_info.title
      mag: severity
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: IBM
      product_name: QRadar

  - name: qradar_source_ip
    match:
      log_format: [json]
      regex: '"event":\s*"source_ip_detected".*?"ip":\s*"(?P<ip>[^"]+).*?"offense_id":\s*(?P<id>\d+)"'
    ocsf_class_uid: 6001
    ocsf_class_name: Threat Detection
    field_map:
      ip: src_endpoint.ip
      id: finding_info.uid
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: IBM
      product_name: QRadar

  - name: qradar_ariel_search
    match:
      log_format: [json]
      regex: '"event":\s*"ariel_search".*?"query":\s*"(?P<query>[^"]+).*?"status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 3004
    ocsf_class_name: Account Change
    field_map:
      query: activity.name
      status: status
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: IBM
      product_name: QRadar