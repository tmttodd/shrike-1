source: okta
description: 'Okta Identity Cloud logs'
version: 1
patterns:
  - name: okta_user_login
    match:
      log_format: [json]
      regex: '"eventType":\s*"user.session.initiate".*?"actor":\s*{"id":\s*"(?P<user_id>[^"]+)".*?"ipAddress":\s*"(?P<ip>[^"]+)"'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      user_id: user.uid
      ip: src_endpoint.ip
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Okta
      product_name: Identity Cloud

  - name: okta_user_locked_out
    match:
      log_format: [json]
      regex: '"eventType":\s*"system.mfa.bypass_lockout_out'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Okta
      product_name: Identity Cloud
      severity_id: 3
      status: failure

  - name: okta_app_assign
    match:
      log_format: [json]
      regex: '"eventType":\s*"application.group_membership.add'
    ocsf_class_uid: 3004
    ocsf_class_name: Account Change
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Okta
      product_name: Identity Cloud