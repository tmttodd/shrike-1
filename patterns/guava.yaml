source: guava
description: 'Guava caching logs'
version: 1
patterns:
  - name: guava_cache
    match:
      log_format: [json]
      regex: '"event":\s*"cache".*?"operation":\s*"(?P<op>\w+).*?"key":\s*"(?P<key>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      op: activity.name
      key: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Guava
      product_name: Cache

  - name: guava_eviction
    match:
      log_format: [json]
      regex: '"event":\s*"eviction".*?"key":\s*"(?P<key>[^"]+).*?"weight":\s*(?P<weight>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      key: process.name
      weight: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Guava
      product_name: Cache

  - name: guava_expiry
    match:
      log_format: [json]
      regex: '"event":\s*"expiry".*?"key":\s*"(?P<key>[^"]+).*?"cause":\s*"(?P<cause>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      key: process.name
      cause: activity.description
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Guava
      product_name: Cache