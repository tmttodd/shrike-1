source: urllib3
description: 'Python urllib3 HTTP client logs'
version: 1
patterns:
  - name: urllib3_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: urllib3

  - name: urllib3_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"status":\s*(?P<status>\d+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      status: status
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: urllib3

  - name: urllib3_retry
    match:
      log_format: [json]
      regex: '"event":\s*"retry".*?"url":\s*"(?P<url>[^"]+).*?"attempts":\s*(?P<att>\d+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      url: dst_endpoint.uri
      att: metadata.count
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: urllib3
      severity_id: 2