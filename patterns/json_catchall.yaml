source: json_catchall
description: Broad JSON catch-all patterns for classes with no specific fingerprint
version: 1
patterns:
  - name: json_detection_catchall
    match:
      log_format: [json]
      regex: '(?P<raw>.+)'
    ocsf_class_uid: 2004
    ocsf_class_name: Detection Finding
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 2
      category_name: "Findings"
    field_map:
      raw: raw_data

