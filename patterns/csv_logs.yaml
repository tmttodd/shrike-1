      contains: "Event Description:"
      regex: '(?P<event_id>\w+),Event Description:\s*(?P<message>[^,]+).*Local Host IP:\s*(?P<src_ip>[0-9.]+),Local Host MAC:\s*(?P<mac>[0-9a-fA-F]*)'
