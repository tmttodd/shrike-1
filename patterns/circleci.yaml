source: circleci
description: 'CircleCI CI/CD logs'
version: 1
patterns:
  - name: circleci_workflow
    match:
      log_format: [json]
      regex: '"event":\s*"workflow".*?"action":\s*"started".*?"name":\s*"(?P<name>[^"]+).*?"id":\s*"(?P<id>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: process.name
      id: process.pid
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: CircleCI
      product_name: CI/CD

  - name: circleci_job
    match:
      log_format: [json]
      regex: '"event":\s*"job".*?"action":\s*"started".*?"name":\s*"(?P<name>[^"]+).*?"executor":\s*"(?P<exec>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: process.name
      exec: device.hostname
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: CircleCI
      product_name: CI/CD

  - name: circleci_step
    match:
      log_format: [json]
      regex: '"event":\s*"step".*?"name":\s*"(?P<name>[^"]+).*?"status":\s*"(?P<status>\w+).*?"duration":\s*(?P<dur>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: activity.name
      status: status
      dur: metadata.duration
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: CircleCI
      product_name: CI/CD