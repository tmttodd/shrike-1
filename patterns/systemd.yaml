source: systemd
description: 'systemd service manager logs'
version: 1
patterns:
  - name: systemd_unit_start
    match:
      log_format: [syslog_bsd]
      regex: 'systemd\[\d+\]:\s+Started\s+(?P<unit>[^"]+).*?"unit":\s*"(?P<u>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      unit: process.name
      u: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: systemd
      product_name: Service Manager

  - name: systemd_unit_stop
    match:
      log_format: [syslog_bsd]
      regex: 'systemd\[\d+\]:\s+Stopped\s+(?P<unit>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      unit: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: systemd
      product_name: Service Manager

  - name: systemd_unit_failed
    match:
      log_format: [syslog_bsd]
      regex: 'systemd\[\d+\]:\s+(?P<unit>[^"]+).*?"result":\s*"(?P<result>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      unit: process.name
      result: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: systemd
      product_name: Service Manager
      severity_id: 3
      status: failure