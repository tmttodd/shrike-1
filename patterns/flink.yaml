source: flink
description: 'Apache Flink stream processing logs'
version: 1
patterns:
  - name: flink_job
    match:
      log_format: [json]
      regex: '"event":\s*"job".*?"job_id":\s*"(?P<id>[^"]+).*?"job_name":\s*"(?P<name>[^"]+).*?"status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      id: process.pid
      name: process.name
      status: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Flink

  - name: flink_task
    match:
      log_format: [json]
      regex: '"event":\s*"task".*?"task_name":\s*"(?P<name>[^"]+).*?"subtask_index":\s*(?P<idx>\d+).*?"attempt":\s*(?P<att>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: activity.name
      idx: metadata.count
      att: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Flink

  - name: flink_checkpoint
    match:
      log_format: [json]
      regex: '"event":\s*"checkpoint".*?"checkpoint_id":\s*(?P<cid>\d+).*?"trigger_timestamp":\s*(?P<ts>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      cid: metadata.count
      ts: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Flink