source: apache
description: 'Apache HTTP Server access and error logs'
version: 1
patterns:
  - name: apache_access
    match:
      log_format: [syslog_bsd]
      regex: '(?P<ip>\S+)\s+-\s+(?P<user>\S+)\s+\[(?P<time>[^\]]+)\]\s+"(?P<request>[^"]+)"\s+(?P<status>\d+)\s+(?P<size>\d+)'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      ip: src_endpoint.ip
      user: user.name
      time: metadata.time
      request: dst_endpoint.uri
      status: status
      size: metadata.size
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Apache
      product_name: HTTP Server

  - name: apache_error
    match:
      log_format: [syslog_bsd]
      regex: '\[(?P<level>\w+)\]\s+\[(?P<time>[^\]]+)\]\s+(?P<msg>[^,]+),\s+referer:\s*(?P<referer>\S+)'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      level: severity
      time: metadata.time
      msg: activity.description
      referer: dst_endpoint.uri
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: HTTP Server
      severity_id: 3

  - name: apache_forbidden
    match:
      log_format: [syslog_bsd]
      regex: '"(?P<request>[^"]+)"\s+403\s+(?P<size>\d+).*?"(?P<referer>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      request: dst_endpoint.uri
      size: metadata.size
      referer: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Apache
      product_name: HTTP Server
      status: failure