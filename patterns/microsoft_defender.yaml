source: microsoft_defender
description: 'Microsoft Defender for Endpoint logs'
version: 1
patterns:
  - name: defender_malware_detected
    match:
      log_format: [json]
      regex: '"AlertId":\s*"(?P<alert_id>[^"]+).*?"Title":\s*"(?P<title>[^"]+).*?"Severity":\s*"(?P<severity>\w+)"'
    ocsf_class_uid: 6002
    ocsf_class_name: Malware Detection
    field_map:
      alert_id: finding_info.uid
      title: finding_info.title
      severity: severity
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: Microsoft
      product_name: Defender for Endpoint

  - name: defender_phishing_detected
    match:
      log_format: [json]
      regex: '"Category":\s*"Phishing".*?"EmailFromAddress":\s*"(?P<sender>[^"]+)"'
    ocsf_class_uid: 6002
    ocsf_class_name: Malware Detection
    field_map:
      sender: src_endpoint.email
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: Microsoft
      product_name: Defender for Endpoint
      severity_id: 3

  - name: defender_credential_theft
    match:
      log_format: [json]
      regex: '"AlertId":\s*".*?"Title":\s*".*?Suspicious authentication.*?"Severity":\s*"(?P<severity>\w+)"'
    ocsf_class_uid: 6001
    ocsf_class_name: Threat Detection
    field_map:
      severity: severity
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: Microsoft
      product_name: Defender for Endpoint
      severity_id: 4