source: python_requests
description: 'Python requests library logs'
version: 1
patterns:
  - name: requests_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: Requests

  - name: requests_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"status_code":\s*(?P<code>\d+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: status
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: Requests

  - name: requests_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"exception":\s*"(?P<exc>[^"]+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      exc: activity.description
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Python
      product_name: Requests
      severity_id: 3