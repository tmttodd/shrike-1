source: retrofit
description: 'Retrofit HTTP client logs'
version: 1
patterns:
  - name: retrofit_call
    match:
      log_format: [json]
      regex: '"event":\s*"call".*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Retrofit
      product_name: HTTP Client

  - name: retrofit_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"code":\s*(?P<code>\d+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: status
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Retrofit
      product_name: HTTP Client

  - name: retrofit_converter
    match:
      log_format: [json]
      regex: '"event":\s*"converter".*?"factory":\s*"(?P<fact>[^"]+).*?"type":\s*"(?P<type>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      fact: process.name
      type: activity.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Retrofit
      product_name: HTTP Client