source: vsftpd
description: 'vsftpd FTP server logs'
version: 1
patterns:
  - name: vsftpd_login
    match:
      log_format: [syslog_bsd]
      regex: '\[(?P<user>\S+)\]\s+OK LOGIN OUT:\s*"(?P<ip>\S+)"'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      user: user.name
      ip: src_endpoint.ip
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: vsftpd
      product_name: FTP Server
      status: success

  - name: vsftpd_fail
    match:
      log_format: [syslog_bsd]
      regex: '\[(?P<user>\S+)\]\s+FAIL LOGIN:\s*"(?P<ip>\S+)"'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      user: user.name
      ip: src_endpoint.ip
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: vsftpd
      product_name: FTP Server
      status: failure

  - name: vsftpd_upload
    match:
      log_format: [syslog_bsd]
      regex: '\[(?P<user>\S+)\]\s+OK UPLOAD:\s*"(?P<file>[^"]+).*?"size":\s*(?P<size>\d+)"'
    ocsf_class_uid: 4004
    ocsf_class_name: File Transfer
    field_map:
      user: user.name
      file: file.name
      size: metadata.size
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: vsftpd
      product_name: FTP Server