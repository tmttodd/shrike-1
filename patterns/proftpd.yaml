source: proftpd
description: 'ProFTPD FTP server logs'
version: 1
patterns:
  - name: proftpd_connect
    match:
      log_format: [syslog_bsd]
      regex: '(?P<ip>\S+)\s+-\s+(?P<user>\S+)\s+\[(?P<time>[^\]]+)\]\s+OK LOGIN'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      ip: src_endpoint.ip
      user: user.name
      time: metadata.time
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: ProFTPD
      product_name: FTP Server
      status: success

  - name: proftpd_fail
    match:
      log_format: [syslog_bsd]
      regex: '(?P<ip>\S+)\s+-\s+(?P<user>\S+)\s+\[(?P<time>[^\]]+)\]\s+FAIL LOGIN'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      ip: src_endpoint.ip
      user: user.name
      time: metadata.time
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: ProFTPD
      product_name: FTP Server
      status: failure

  - name: proftpd_transfer
    match:
      log_format: [syslog_bsd]
      regex: '(?P<ip>\S+)\s+-\s+(?P<user>\S+)\s+\[(?P<time>[^\]]+)\]\s+(?P<cmd>\w+)\s+(?P<file>[^"]+).*?"size":\s*(?P<size>\d+)"'
    ocsf_class_uid: 4004
    ocsf_class_name: File Transfer
    field_map:
      ip: src_endpoint.ip
      user: user.name
      time: metadata.time
      cmd: activity.name
      file: file.name
      size: metadata.size
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: ProFTPD
      product_name: FTP Server