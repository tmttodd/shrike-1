source: auditd
description: 'Linux audit daemon logs'
version: 1
patterns:
  - name: auditd_syscall
    match:
      log_format: [syslog_bsd]
      regex: 'type=\s*SYSCALL.*?syscall=\s*(?P<syscall>\d+).*?arch=\s*(?P<arch>\S+).*?success=\s*(?P<success>\w+).*?exit=\s*(?P<exit>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      syscall: metadata.event_code
      arch: activity.description
      success: status
      exit: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: auditd
      product_name: Linux Audit

  - name: auditd_path
    match:
      log_format: [syslog_bsd]
      regex: 'type=\s*PATH.*?item=\s*(?P<item>\d+).*?"name":\s*"(?P<name>[^"]+).*?"inode":\s*(?P<inode>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      item: metadata.count
      name: file.name
      inode: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: auditd
      product_name: Linux Audit

  - name: auditd_execve
    match:
      log_format: [syslog_bsd]
      regex: 'type=\s*EXECVE.*?argc=\s*(?P<argc>\d+).*?"a[0-9]+":\s*"(?P<cmd>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      argc: metadata.count
      cmd: process.cmd_line
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: auditd
      product_name: Linux Audit