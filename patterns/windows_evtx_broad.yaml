source: windows_evtx_broad
description: Broad Windows EVTX JSON patterns for all EventIDs
version: 1
patterns:
  # Process Activity — EventID 4688 (create) and 4689 (terminate)
  - name: evtx_process_4689
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "ProcessName", "LogHost"]
      json_match:
        EventID: 4689
    ocsf_class_uid: 1007
    ocsf_class_name: Process Activity
    static:
      activity_id: 3
      activity_name: "Terminate"
      severity_id: 1
      category_uid: 1
      category_name: "System Activity"
    field_map:
      ProcessName: process.name
      ProcessID: process.pid
      UserName: actor.user.name
      DomainName: actor.user.domain
      LogHost: device.hostname
      LogonID: session.uid

  # Kerberos — EventID 4768/4769/4770
  - name: evtx_kerberos_tgs
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4769
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      ServiceName: service.name
      UserName: user
      Source: src_endpoint.hostname
      LogHost: device.hostname
      Status: status

  - name: evtx_kerberos_tgt
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4768
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      UserName: user
      Source: src_endpoint.hostname
      LogHost: device.hostname

  - name: evtx_kerberos_renew
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4770
    ocsf_class_uid: 3003
    ocsf_class_name: Authorize Session
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      ServiceName: service.name
      UserName: user
      LogHost: device.hostname

  # Auth — EventID 4776 (credential validation), 4647 (user initiated logoff)
  - name: evtx_credential_validation
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4776
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
      auth_protocol: "NTLM"
    field_map:
      UserName: user
      LogHost: device.hostname
      Source: src_endpoint.hostname

  - name: evtx_logoff_4634
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4634
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 2
      activity_name: "Logoff"
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      UserName: user
      LogHost: device.hostname
      LogonID: session.uid

  - name: evtx_logoff_4647
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4647
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 2
      activity_name: "Logoff"
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      UserName: user
      LogHost: device.hostname

  - name: evtx_explicit_cred_4648
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4648
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      severity_id: 2
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      UserName: user
      LogHost: device.hostname
      Destination: dst_endpoint.hostname

  # Special privileges — EventID 4672
  - name: evtx_special_privileges_broad
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4672
    ocsf_class_uid: 3005
    ocsf_class_name: User Access Management
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      UserName: user
      DomainName: user.domain
      LogHost: device.hostname
      LogonID: session.uid

  # Windows starting up — EventID 4608
  - name: evtx_windows_startup
    match:
      log_format: [evtx_json, json]
      json_has: ["EventID", "LogHost"]
      json_match:
        EventID: 4608
    ocsf_class_uid: 6002
    ocsf_class_name: Application Lifecycle
    static:
      activity_id: 3
      activity_name: "Start"
      severity_id: 1
      category_uid: 6
      category_name: "Application Activity"
    field_map:
      LogHost: device.hostname
