  - name: custom_api_generic
    match:
      log_format: [custom]
      regex: '(?P<msg>.{20,})'
    ocsf_class_uid: 6003
    ocsf_class_name: API Activity
    static:
      activity_id: 0
      severity_id: 1
      category_uid: 6
      category_name: "Application Activity"
    field_map:
      msg: message

  - name: custom_lifecycle_generic
    match:
      log_format: [custom]
      regex: '(?P<msg>.{20,})'
    ocsf_class_uid: 6002
    ocsf_class_name: Application Lifecycle
    static:
      activity_id: 0
      severity_id: 1
      category_uid: 6
      category_name: "Application Activity"
    field_map:
      msg: message
