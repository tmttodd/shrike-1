source: tekton
description: 'Tekton CI/CD pipeline logs'
version: 1
patterns:
  - name: tekton_taskrun
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"TaskRun started".*?"name":\s*"(?P<name>[^"]+).*?"namespace":\s*"(?P<ns>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: process.name
      ns: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Tekton
      product_name: CI/CD Pipeline

  - name: tekton_pipelinerun
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"PipelineRun started".*?"name":\s*"(?P<name>[^"]+).*?"status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: process.name
      status: status
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Tekton
      product_name: CI/CD Pipeline

  - name: tekton_step
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"Step completed".*?"name":\s*"(?P<name>[^"]+).*?"duration":\s*(?P<dur>\d+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      name: activity.name
      dur: metadata.duration
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Tekton
      product_name: CI/CD Pipeline