source: sshd
description: OpenSSH authentication and session logs
version: 1
patterns:
  - name: sshd_accepted_password
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'Accepted\s+(?P<auth_proto>password|keyboard-interactive)\s+for\s+(?P<user>\S+)\s+from\s+(?P<src_ip>\S+)\s+port\s+(?P<src_port>\d+)\s*(?:ssh2)?'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      activity_name: "Logon"
      severity_id: 1
      status_id: 1
      status: "Success"
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300201
    field_map:
      user: user
      src_ip: src_endpoint.ip
      src_port: src_endpoint.port
      auth_proto: auth_protocol

  - name: sshd_accepted_publickey
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'Accepted\s+publickey\s+for\s+(?P<user>\S+)\s+from\s+(?P<src_ip>\S+)\s+port\s+(?P<src_port>\d+)'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      activity_name: "Logon"
      severity_id: 1
      status_id: 1
      status: "Success"
      category_uid: 3
      category_name: "Identity & Access Management"
      auth_protocol: "publickey"
      type_uid: 300201
    field_map:
      user: user
      src_ip: src_endpoint.ip
      src_port: src_endpoint.port
      key_type: auth_protocol_id
      key_fingerprint: metadata.fingerprint

  - name: sshd_failed_password
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'Failed\s+(?P<auth_proto>password|publickey|keyboard-interactive)\s+for\s+(?:invalid\s+user\s+)?(?P<user>\S+)\s+from\s+(?P<src_ip>\S+)\s+port\s+(?P<src_port>\d+)'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      activity_name: "Logon"
      severity_id: 3
      status_id: 2
      status: "Failure"
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300201
    field_map:
      user: user
      src_ip: src_endpoint.ip
      src_port: src_endpoint.port
      auth_proto: auth_protocol

  - name: sshd_session_opened
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'pam_unix\(sshd:session\):\s+session\s+opened\s+for\s+user\s+(?P<user>\S+)(?:\(uid=(?P<uid>\d+)\))?'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      activity_name: "Logon"
      severity_id: 1
      status_id: 1
      status: "Success"
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300201
    field_map:
      user: user
      uid: actor.user.uid

  - name: sshd_session_closed
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'pam_unix\(sshd:session\):\s+session\s+closed\s+for\s+user\s+(?P<user>\S+)'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 2
      activity_name: "Logoff"
      severity_id: 1
      status_id: 1
      status: "Success"
      category_uid: 3
      category_name: "Identity & Access Management"
      type_uid: 300202
    field_map:
      user: user

  - name: sshd_disconnect
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'sshd\[\d+\]:\s+(?:Received disconnect|Disconnected)\s+from\s+(?:user\s+(?P<user>\S+)\s+)?(?P<src_ip>\d+\.\d+\.\d+\.\d+)\s+port\s+(?P<src_port>\d+)'
    ocsf_class_uid: 4007
    ocsf_class_name: SSH Activity
    static:
      activity_id: 2
      activity_name: "Close"
      severity_id: 1
      category_uid: 4
      category_name: "Network Activity"
    field_map:
      user: user
      src_ip: src_endpoint.ip
      src_port: src_endpoint.port

  - name: sshd_pam_misc
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: 'sshd\[\d+\]:\s+(?P<msg>.+)'
      contains: "sshd"
    ocsf_class_uid: 4007
    ocsf_class_name: SSH Activity
    static:
      activity_id: 0
      severity_id: 1
      category_uid: 4
      category_name: "Network Activity"
    field_map:
      msg: message
