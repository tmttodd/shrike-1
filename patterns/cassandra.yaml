source: cassandra
description: 'Apache Cassandra distributed database logs'
version: 1
patterns:
  - name: cassandra_query
    match:
      log_format: [syslog_bsd]
      regex: 'Query processed.*?table:\s*(?P<table>\S+).*?duration:\s*(?P<dur>\d+)'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      table: process.name
      dur: metadata.duration
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Cassandra

  - name: cassandra_compaction
    match:
      log_format: [syslog_bsd]
      regex: 'Compaction.*?table:\s*(?P<table>\S+).*?duration:\s*(?P<dur>\d+).*?rows:\s*(?P<rows>\d+)'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      table: process.name
      dur: metadata.duration
      rows: metadata.count
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Cassandra

  - name: cassandra_node_error
    match:
      log_format: [syslog_bsd]
      regex: '\[(?P<level>\w+)\]\s+(?P<msg>[^,]+),\s+node:\s*(?P<node>\S+)'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      level: severity
      msg: activity.description
      node: process.name
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Apache
      product_name: Cassandra
      severity_id: 3
      status: failure