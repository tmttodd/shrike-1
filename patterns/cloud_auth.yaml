source: cloud_auth
description: Cloud provider authentication events (AWS, Azure, GCP)
version: 1
patterns:
  - name: aws_console_login
    match:
      log_format: [json]
      json_has: ["event_name", "source_ip"]
      json_match:
        event_name: ConsoleLogin
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      activity_name: "Logon"
      severity_id: 2
      category_uid: 3
      category_name: "Identity & Access Management"
      auth_protocol: "AWS Console"
    field_map:
      source_ip: src_endpoint.ip
      user_type: user
      account_id: cloud.account_uid
      region: cloud.region
      rule_name: finding_info.title

  - name: aws_iam_event
    match:
      log_format: [json]
      json_has: ["event_name", "account_id"]
      regex: 'IAM|iam'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    static:
      activity_id: 1
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      source_ip: src_endpoint.ip
      event_name: activity_name
      account_id: cloud.account_uid
      region: cloud.region

  - name: cloud_security_finding
    match:
      log_format: [json]
      json_has: ["severity", "rule_name"]
      regex: 'AWS_|Azure_|GCP_'
    ocsf_class_uid: 2004
    ocsf_class_name: Detection Finding
    static:
      activity_id: 1
      activity_name: "Create"
      category_uid: 2
      category_name: "Findings"
    field_map:
      rule_name: finding_info.title
      severity: severity
      source_ip: src_endpoint.ip
      account_id: cloud.account_uid
      region: cloud.region
    severity_map:
      field: severity
      rules:
        - value: 1
          severity_id: 2
        - value: 2
          severity_id: 3
        - value: 3
          severity_id: 4
