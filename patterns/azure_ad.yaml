source: azure_ad
description: 'Microsoft Azure Active Directory (Entra ID) logs'
version: 1
patterns:
  - name: azure_ad_user_login
    match:
      log_format: [json]
      regex: '"OperationName":\s*"Sign-in interactive".*?"UserId":\s*"(?P<user_id>[^"]+)"'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      user_id: user.uid
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Microsoft
      product_name: Azure AD

  - name: azure_ad_failed_login
    match:
      log_format: [json]
      regex: '"OperationName":\s*".*?Sign-in".*?"ResultDescription":\s*"(?P<reason>[^"]+)"'
    ocsf_class_uid: 3002
    ocsf_class_name: Authentication
    field_map:
      reason: status
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Microsoft
      product_name: Azure AD
      status: failure

  - name: azure_ad_user_created
    match:
      log_format: [json]
      regex: '"OperationName":\s*"Add user".*?"Target":\s*{.*?"UserPrincipalName":\s*"(?P<user>[^"]+)"'
    ocsf_class_uid: 3001
    ocsf_class_name: Entity Account Created
    field_map:
      user: user.name
    static:
      category_uid: 3
      category_name: Identity & Access Management
      vendor_name: Microsoft
      product_name: Azure AD