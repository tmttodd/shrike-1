source: onepassword
description: 1Password and Docker container event patterns
version: 1
patterns:
  - name: docker_container_event
    match:
      log_format: [json]
      json_has: ["Action", "Actor", "Type", "scope"]
    ocsf_class_uid: 6002
    ocsf_class_name: Application Lifecycle
    static:
      severity_id: 1
      category_uid: 6
      category_name: "Application Activity"
    field_map:
      Action: activity_name
      Type: metadata.product.name
      scope: metadata.product.feature.name
      time: time
      timeNano: metadata.original_time

  - name: onepassword_connect_log
    match:
      log_format: [json]
      json_has: ["log_message", "level", "scope", "timestamp"]
    ocsf_class_uid: 3001
    ocsf_class_name: Account Change
    static:
      severity_id: 1
      category_uid: 3
      category_name: "Identity & Access Management"
    field_map:
      log_message: message
      level: severity
      timestamp: time
      scope.request_id: metadata.uid

  - name: onepassword_action
    match:
      log_format: [json]
      json_has: ["action", "client"]
      regex: '"app_name"'
    ocsf_class_uid: 6003
    ocsf_class_name: API Activity
    static:
      severity_id: 1
      category_uid: 6
      category_name: "Application Activity"
    field_map:
      action: api.operation
      timestamp: time
