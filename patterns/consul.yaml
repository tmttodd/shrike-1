source: consul
description: 'HashiCorp Consul service mesh logs'
version: 1
patterns:
  - name: consul_member_joined
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"member.*?joined".*?"Node":\s*"(?P<node>[^"]+)"'
    ocsf_class_uid: 4002
    ocsf_class_name: Network Connection
    field_map:
      node: device.hostname
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: HashiCorp
      product_name: Consul

  - name: consul_member_left
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"member.*?left".*?"Node":\s*"(?P<node>[^"]+)"'
    ocsf_class_uid: 4002
    ocsf_class_name: Network Connection
    field_map:
      node: device.hostname
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: HashiCorp
      product_name: Consul
      status: failure

  - name: consul_health_change
    match:
      log_format: [json]
      regex: '"level":\s*"info".*?"msg":\s*"health\.check".*?"ServiceName":\s*"(?P<svc>[^"]+).*?"Status":\s*"(?P<status>\w+)"'
    ocsf_class_uid: 6001
    ocsf_class_name: Threat Detection
    field_map:
      svc: process.name
      status: status
    static:
      category_uid: 6
      category_name: Security Findings
      vendor_name: HashiCorp
      product_name: Consul