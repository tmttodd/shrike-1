source: node_http
description: 'Node.js http module logs'
version: 1
patterns:
  - name: node_http_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTP

  - name: node_http_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"statusCode":\s*(?P<code>\d+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: status
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTP

  - name: node_http_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"code":\s*"(?P<code>[^"]+).*?"msg":\s*"(?P<msg>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: metadata.event_code
      msg: activity.description
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTP
      severity_id: 3