source: firewall
description: Linux firewall logs — UFW and iptables block/allow from syslog
version: 1
patterns:
  - name: ufw_block
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: '\[UFW\s+(?P<action>BLOCK|DENY)\]\s+IN=(?P<in_iface>\S*)\s+OUT=(?P<out_iface>\S*)\s+.*?SRC=(?P<src_ip>\S+)\s+DST=(?P<dst_ip>\S+)\s+.*?PROTO=(?P<proto>\S+)(?:\s+SPT=(?P<src_port>\d+))?(?:\s+DPT=(?P<dst_port>\d+))?'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 5
      activity_name: "Refuse"
      severity_id: 2
      status_id: 1
      status: "Success"
      category_uid: 4
      category_name: "Network Activity"
      type_uid: 400105
      disposition_id: 2
      disposition: "Blocked"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      src_port: src_endpoint.port
      dst_port: dst_endpoint.port
      proto: connection_info.protocol_name
      in_iface: connection_info.boundary
      action: activity_name

  - name: ufw_allow
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: '\[UFW\s+(?P<action>ALLOW)\]\s+IN=(?P<in_iface>\S*)\s+OUT=(?P<out_iface>\S*)\s+.*?SRC=(?P<src_ip>\S+)\s+DST=(?P<dst_ip>\S+)\s+.*?PROTO=(?P<proto>\S+)(?:\s+SPT=(?P<src_port>\d+))?(?:\s+DPT=(?P<dst_port>\d+))?'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 1
      activity_name: "Allow"
      severity_id: 1
      status_id: 1
      status: "Success"
      category_uid: 4
      category_name: "Network Activity"
      type_uid: 400101
      disposition_id: 1
      disposition: "Allowed"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      src_port: src_endpoint.port
      dst_port: dst_endpoint.port
      proto: connection_info.protocol_name
      in_iface: connection_info.boundary

  - name: iptables_drop
    match:
      log_format: [syslog_bsd, syslog_rfc5424, syslog_rfc3164]
      regex: '(?:iptables|kernel).*?(?P<action>DROP|REJECT)\s+IN=(?P<in_iface>\S*)\s+OUT=(?P<out_iface>\S*)\s+.*?SRC=(?P<src_ip>\S+)\s+DST=(?P<dst_ip>\S+)\s+.*?PROTO=(?P<proto>\S+)(?:\s+SPT=(?P<src_port>\d+))?(?:\s+DPT=(?P<dst_port>\d+))?'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 5
      activity_name: "Refuse"
      severity_id: 2
      status_id: 1
      status: "Success"
      category_uid: 4
      category_name: "Network Activity"
      type_uid: 400105
      disposition_id: 2
      disposition: "Blocked"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      src_port: src_endpoint.port
      dst_port: dst_endpoint.port
      proto: connection_info.protocol_name
      in_iface: connection_info.boundary
      action: disposition

  - name: kv_firewall_deny
    match:
      log_format: [kv, custom]
      regex: 'action=(?P<action>deny|block|drop|reject)\s.*?(?:src|src_ip)=(?P<src_ip>\S+)\s.*?(?:dst|dst_ip)=(?P<dst_ip>\S+).*?(?:proto|protocol)=(?P<proto>\S+).*?(?:dport|dst_port|dpt)=(?P<dst_port>\d+)'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 5
      activity_name: "Refuse"
      severity_id: 2
      category_uid: 4
      category_name: "Network Activity"
      disposition_id: 2
      disposition: "Blocked"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      dst_port: dst_endpoint.port
      proto: connection_info.protocol_name

  - name: kv_firewall_allow
    match:
      log_format: [kv, custom]
      regex: 'action=(?P<action>allow|accept|permit)\s.*?(?:src|src_ip)=(?P<src_ip>\S+)\s.*?(?:dst|dst_ip)=(?P<dst_ip>\S+).*?(?:proto|protocol)=(?P<proto>\S+)'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 1
      activity_name: "Allow"
      severity_id: 1
      category_uid: 4
      category_name: "Network Activity"
      disposition_id: 1
      disposition: "Allowed"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      proto: connection_info.protocol_name

  - name: kv_firewall_generic_src_dst
    match:
      log_format: [kv, syslog_bsd, syslog_rfc3164, custom]
      regex: 'SRC=(?P<src_ip>\d+\.\d+\.\d+\.\d+)\s+DST=(?P<dst_ip>\d+\.\d+\.\d+\.\d+).*?PROTO=(?P<proto>\S+)(?:.*?SPT=(?P<src_port>\d+))?(?:.*?DPT=(?P<dst_port>\d+))?'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    static:
      activity_id: 6
      severity_id: 1
      category_uid: 4
      category_name: "Network Activity"
    field_map:
      src_ip: src_endpoint.ip
      dst_ip: dst_endpoint.ip
      src_port: src_endpoint.port
      dst_port: dst_endpoint.port
      proto: connection_info.protocol_name
