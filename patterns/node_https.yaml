source: node_https
description: 'Node.js https module logs'
version: 1
patterns:
  - name: node_https_request
    match:
      log_format: [json]
      regex: '"event":\s*"request".*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTPS

  - name: node_https_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"statusCode":\s*(?P<code>\d+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: status
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTPS

  - name: node_https_tls_error
    match:
      log_format: [json]
      regex: '"event":\s*"tls_error".*?"code":\s*"(?P<code>[^"]+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      code: metadata.event_code
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Node.js
      product_name: HTTPS
      severity_id: 3