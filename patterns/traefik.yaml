source: traefik
description: 'Traefik reverse proxy logs'
version: 1
patterns:
  - name: traefik_request
    match:
      log_format: [json]
      regex: '"event":\s*"access".*?"frontendName":\s*"(?P<frontend>[^"]+).*?"method":\s*"(?P<method>\w+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      frontend: process.name
      method: activity.name
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Traefik
      product_name: Reverse Proxy

  - name: traefik_backend_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"backend":\s*"(?P<backend>[^"]+).*?"msg":\s*"(?P<msg>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      backend: process.name
      msg: activity.description
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Traefik
      product_name: Reverse Proxy
      severity_id: 3
      status: failure

  - name: traefik_middleware_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"middleware":\s*"(?P<mw>[^"]+).*?"msg":\s*"(?P<msg>[^"]+)"'
    ocsf_class_uid: 5001
    ocsf_class_name: Process Started
    field_map:
      mw: process.name
      msg: activity.description
    static:
      category_uid: 5
      category_name: System Activity
      vendor_name: Traefik
      product_name: Reverse Proxy
      severity_id: 2
      status: failure