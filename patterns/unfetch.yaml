source: unfetch
description: 'Unfetch fetch client logs'
version: 1
patterns:
  - name: unfetch_fetch
    match:
      log_format: [json]
      regex: '"event":\s*"fetch".*?"url":\s*"(?P<url>[^"]+).*?"options":\s*"(?P<opts>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      url: dst_endpoint.uri
      opts: activity.name
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Unfetch
      product_name: Fetch Client

  - name: unfetch_response
    match:
      log_format: [json]
      regex: '"event":\s*"response".*?"url":\s*"(?P<url>[^"]+).*?"ok":\s*(?P<ok>\w+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      url: dst_endpoint.uri
      ok: status
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Unfetch
      product_name: Fetch Client

  - name: unfetch_error
    match:
      log_format: [json]
      regex: '"event":\s*"error".*?"message":\s*"(?P<msg>[^"]+).*?"url":\s*"(?P<url>[^"]+)"'
    ocsf_class_uid: 4001
    ocsf_class_name: Network Activity
    field_map:
      msg: activity.description
      url: dst_endpoint.uri
    static:
      category_uid: 4
      category_name: Network Activity
      vendor_name: Unfetch
      product_name: Fetch Client
      severity_id: 3