# fluent-bit configuration for Shrike log ingestion
# Routes logs from multiple sources to Shrike HTTP API

[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf

# Docker container logs
[INPUT]
    Name          tail
    Path          /var/lib/docker/containers/*/*.log
    Parser        docker_json
    Tag           docker.*
    db            /var/log/fluent-bit/positions.db
    Rotate_Wait   30
    Mem_Buf_Limit 5MB

# System syslog (optional - comment out if not needed)
[INPUT]
    Name          tail
    Path          /var/log/syslog
    Parser        syslog_rfc5424
    Tag           syslog
    db            /var/log/fluent-bit/positions.db
    Rotate_Wait   30
    Mem_Buf_Limit 5MB

# Syslog via UDP (optional - for direct syslog forwarding)
# [INPUT]
#     Name          syslog
#     Port          514
#     Mode          UDP
#     Parser        syslog_rfc5424
#     Tag           syslog.udp

# Parser definitions
[PARSER]
    Name        docker_json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

[PARSER]
    Name        syslog_rfc5424
    Format      regex
    Regex       ^<(?P<pri>\d+)>(?P<ver>\d+)\s+(?P<ts>\S+)\s+(?P<host>\S+)\s+(?P<prog>\S+?)(?:\[(?P<pid>\d+)\])?:\s*(?P<msg>.*)$
    Time_Key    ts
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# Add metadata to all logs
[FILTER]
    Name          modify
    Match         *
    Add           shrike_ingested true
    Add           host ${HOSTNAME}

# Send all logs to Shrike HTTP API
[OUTPUT]
    Name          http
    Match         *
    Host          shrike
    Port          8080
    URI           /v1/ingest
    Format        json
    Retry_Limit   False
    tls           Off
