name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/unit/ -q

      - name: Quality gate
        run: |
          python scripts/quality_report.py --check quality_baseline.json
          echo "Quality gate passed"
