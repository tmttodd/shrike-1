# Shrike — Production Deployment
# Normalizes logs to OCSF and routes to Splunk by class index
# Built from: 883510b (feat: Complete code quality, performance, and security hardening)
#
# Usage:
#   docker compose up -d
#   curl -X POST http://localhost:8080/v1/ingest \
#     -H "Content-Type: application/json" \
#     -d '{"logs": ["Mar 29 10:00:00 host sshd[1234]: Accepted password for admin from 10.0.0.1 port 22"]}'

services:
  shrike:
    build: .
    container_name: shrike
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP API (/v1/ingest, /normalize, /health)
    environment:
      - SHRIKE_DESTINATIONS=splunk_hec
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - SHRIKE_SPLUNK_TLS_VERIFY=${SHRIKE_SPLUNK_TLS_VERIFY:-false}
      - INGEST_API_KEY=${INGEST_API_KEY}
      - SHRIKE_WAL_DIR=/data/wal
      - SHRIKE_WAL_MAX_MB=2048
      # LLM extraction (optional — enables Tiers 2 & 3)
      # Any OpenAI-compatible endpoint: Ollama, vLLM, LiteLLM, OpenAI, etc.
      # - SHRIKE_LLM_URL=http://host.docker.internal:11434/v1
      # - SHRIKE_LLM_MODEL=overlabbed/shrike-extractor  # or any model: llama3.2:3b, etc.
      # - SHRIKE_LLM_API_KEY=
    volumes:
      - shrike-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    restart: unless-stopped
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - fluent-bit-positions:/var/log/fluent-bit
    depends_on:
      shrike:
        condition: service_healthy

  flywheel:
    build:
      context: .
      target: production
    container_name: shrike-flywheel
    command: python -m flywheel --interval 60
    environment:
      - SHRIKE_HEALTH_URL=http://shrike:8080/health
      - SHRIKE_WAL_DIR=/data/wal
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - FLYWHEEL_STATE_FILE=/data/flywheel_state.json
    volumes:
      - shrike-data:/data
    depends_on:
      shrike:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  test:
    build:
      context: .
      target: test
    container_name: shrike-test
    working_dir: /shrike
    command: python -m pytest tests/unit/ tests/test_server.py tests/test_config.py -q
    volumes:
      - .:/shrike
    depends_on: []
    profiles:
      - test

volumes:
  shrike-data:
  fluent-bit-positions:
