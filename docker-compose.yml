# Shrike — Production Deployment
# Normalizes logs to OCSF and routes to Splunk by class index
#
# Usage:
#   docker compose up -d
#   curl -X POST http://localhost:8080/v1/ingest \
#     -H "Content-Type: application/json" \
#     -d '{"logs": ["Mar 29 10:00:00 host sshd[1234]: Accepted password for admin from 10.0.0.1 port 22"]}'

services:
  shrike:
    build: .
    container_name: shrike
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP API (/v1/ingest, /normalize, /health)
      - "1514:1514/udp" # Syslog UDP
      - "1514:1514/tcp" # Syslog TCP
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - SHRIKE_MODE=full
      - SHRIKE_DESTINATIONS=file_jsonl
      - SHRIKE_SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-https://localhost:8088}
      - SHRIKE_SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - SHRIKE_FILE_OUTPUT_DIR=/data/output
      - SHRIKE_WAL_DIR=/data/wal
      - SHRIKE_WAL_MAX_MB=500
    volumes:
      - ./models:/app/models:ro
      - shrike-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  shrike-data:
